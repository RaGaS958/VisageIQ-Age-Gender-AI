<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgStat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c14"/>
      <stop offset="100%" style="stop-color:#0d0f1e"/>
    </linearGradient>
    <!-- Card gradients -->
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(124,106,247,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(124,106,247,0.04)"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(103,232,249,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(103,232,249,0.04)"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(110,231,183,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(110,231,183,0.04)"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(244,114,182,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(244,114,182,0.04)"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(251,191,36,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(251,191,36,0.04)"/>
    </linearGradient>

    <!-- 3D side faces for cards -->
    <linearGradient id="side1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(124,106,247,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(124,106,247,0.1)"/>
    </linearGradient>
    <linearGradient id="side2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(103,232,249,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(103,232,249,0.1)"/>
    </linearGradient>
    <linearGradient id="side3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(110,231,183,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(110,231,183,0.1)"/>
    </linearGradient>
    <linearGradient id="side4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(244,114,182,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(244,114,182,0.1)"/>
    </linearGradient>
    <linearGradient id="side5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(251,191,36,0.4)"/>
      <stop offset="100%" style="stop-color:rgba(251,191,36,0.1)"/>
    </linearGradient>

    <filter id="cardShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="rgba(0,0,0,0.7)"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgStat)" rx="12"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="66" x2="900" y2="66"/>
    <line x1="0" y1="132" x2="900" y2="132"/>
  </g>

  <!-- ══ CARD 1: 23,708 — Purple ══ -->
  <g filter="url(#cardShadow)" transform="translate(20,20)">
    <!-- 3D bottom face -->
    <polygon points="0,140 150,140 158,132 8,132" fill="url(#side1)" opacity="0.5"/>
    <!-- 3D right face -->
    <polygon points="150,20 158,12 158,132 150,140" fill="url(#side1)" opacity="0.4"/>
    <!-- Main card face -->
    <rect width="150" height="140" rx="10" fill="url(#card1)" stroke="rgba(124,106,247,0.45)" stroke-width="1.2"/>
    <!-- Top accent bar -->
    <rect width="150" height="3" rx="2" fill="#a78bfa" opacity="0.9"/>
    <!-- Icon -->
    <text x="75" y="55" text-anchor="middle" font-size="26">🖼️</text>
    <!-- Value -->
    <text x="75" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#a78bfa">23,708</text>
    <!-- Label -->
    <text x="75" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">TRAINING</text>
    <text x="75" y="122" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">FACES</text>
  </g>

  <!-- ══ CARD 2: 11.6M — Cyan ══ -->
  <g filter="url(#cardShadow)" transform="translate(192,14)">
    <polygon points="0,146 150,146 158,138 8,138" fill="url(#side2)" opacity="0.5"/>
    <polygon points="150,20 158,12 158,138 150,146" fill="url(#side2)" opacity="0.4"/>
    <rect width="150" height="146" rx="10" fill="url(#card2)" stroke="rgba(103,232,249,0.45)" stroke-width="1.2"/>
    <rect width="150" height="3" rx="2" fill="#67e8f9" opacity="0.9"/>
    <text x="75" y="58" text-anchor="middle" font-size="26">🧠</text>
    <text x="75" y="93" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#67e8f9">11.6M</text>
    <text x="75" y="113" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">PARAMETERS</text>
    <text x="75" y="125" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">44.4 MB SIZE</text>
  </g>

  <!-- ══ CARD 3: 88-93% — Green ══ (tallest = most important) -->
  <g filter="url(#cardShadow)" transform="translate(364,6)">
    <polygon points="0,154 150,154 158,146 8,146" fill="url(#side3)" opacity="0.5"/>
    <polygon points="150,20 158,12 158,146 150,154" fill="url(#side3)" opacity="0.4"/>
    <rect width="150" height="154" rx="10" fill="url(#card3)" stroke="rgba(110,231,183,0.55)" stroke-width="1.5"/>
    <rect width="150" height="3" rx="2" fill="#6ee7b7" opacity="0.9"/>
    <!-- Glow behind value -->
    <ellipse cx="75" cy="95" rx="45" ry="20" fill="#6ee7b7" opacity="0.08"/>
    <text x="75" y="58" text-anchor="middle" font-size="26">🎯</text>
    <text x="75" y="97" text-anchor="middle" font-family="'Courier New', monospace" font-size="21" font-weight="bold" fill="#6ee7b7">88–93%</text>
    <text x="75" y="117" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">GENDER</text>
    <text x="75" y="129" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">ACCURACY</text>
    <text x="75" y="143" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6ee7b7" opacity="0.6">★ BEST METRIC</text>
  </g>

  <!-- ══ CARD 4: 5-8 yrs — Pink ══ -->
  <g filter="url(#cardShadow)" transform="translate(536,14)">
    <polygon points="0,146 150,146 158,138 8,138" fill="url(#side4)" opacity="0.5"/>
    <polygon points="150,20 158,12 158,138 150,146" fill="url(#side4)" opacity="0.4"/>
    <rect width="150" height="146" rx="10" fill="url(#card4)" stroke="rgba(244,114,182,0.45)" stroke-width="1.2"/>
    <rect width="150" height="3" rx="2" fill="#f472b6" opacity="0.9"/>
    <text x="75" y="58" text-anchor="middle" font-size="26">📉</text>
    <text x="75" y="93" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#f472b6">5–8 yrs</text>
    <text x="75" y="113" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">AGE MAE</text>
    <text x="75" y="125" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">REGRESSION</text>
  </g>

  <!-- ══ CARD 5: 128×128 — Amber ══ -->
  <g filter="url(#cardShadow)" transform="translate(708,20)">
    <polygon points="0,140 150,140 158,132 8,132" fill="url(#side5)" opacity="0.5"/>
    <polygon points="150,20 158,12 158,132 150,140" fill="url(#side5)" opacity="0.4"/>
    <rect width="150" height="140" rx="10" fill="url(#card5)" stroke="rgba(251,191,36,0.45)" stroke-width="1.2"/>
    <rect width="150" height="3" rx="2" fill="#fbbf24" opacity="0.9"/>
    <text x="75" y="55" text-anchor="middle" font-size="26">📐</text>
    <text x="75" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#fbbf24">128×128</text>
    <text x="75" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">INPUT</text>
    <text x="75" y="122" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1">RESOLUTION</text>
  </g>
</svg>
