<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="pipeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c14"/>
      <stop offset="100%" style="stop-color:#0f0a1e"/>
    </linearGradient>

    <!-- Stage 1 gradients -->
    <linearGradient id="s1top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="s1front" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="s1side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#164e63"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>

    <!-- Stage 2 gradients -->
    <linearGradient id="s2top" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c6af7"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="s2front" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4c3fb5"/>
      <stop offset="100%" style="stop-color:#6254cc"/>
    </linearGradient>
    <linearGradient id="s2side" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c3fb5"/>
    </linearGradient>

    <!-- Output gradients -->
    <linearGradient id="outTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="outFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="outSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>

    <!-- Callback block gradients -->
    <linearGradient id="cbTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="cbFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    <linearGradient id="cbSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>

    <filter id="pipeShadow">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="rgba(0,0,0,0.7)"/>
    </filter>
    <filter id="glowPipe">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#pipeBg)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#7c6af7" stroke-width="0.5">
    <line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#a78bfa">2-Stage Training Pipeline</text>
  <text x="450" y="46" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#4a5568">Isometric · Freeze → Train Head → Unfreeze → Fine-Tune</text>

  <!-- ══ BLOCK A: Data Prep ══ (small intro cube) -->
  <g filter="url(#pipeShadow)" transform="translate(22, 100)">
    <!-- front -->
    <polygon points="0,20 80,20 80,110 0,110" fill="rgba(107,114,128,0.25)" stroke="rgba(156,163,175,0.3)" stroke-width="0.8"/>
    <!-- top -->
    <polygon points="0,20 80,20 96,8 16,8" fill="rgba(107,114,128,0.4)"/>
    <!-- side -->
    <polygon points="80,20 96,8 96,98 80,110" fill="rgba(107,114,128,0.2)"/>
    <line x1="0" y1="20" x2="80" y2="20" stroke="rgba(156,163,175,0.5)" stroke-width="1"/>
    <text x="40" y="58" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">UTKFace</text>
    <text x="40" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">23,708</text>
    <text x="40" y="86" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="rgba(255,255,255,0.45)">images</text>
    <text x="40" y="100" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" fill="#9ca3af">DATA</text>
  </g>

  <!-- Arrow A→1 -->
  <g opacity="0.7">
    <line x1="122" y1="155" x2="155" y2="155" stroke="#67e8f9" stroke-width="2.5"/>
    <polygon points="155,150 164,155 155,160" fill="#67e8f9"/>
  </g>

  <!-- ══ BLOCK 1: Stage 1 — Freeze (Cyan, taller) ══ -->
  <g filter="url(#pipeShadow)" transform="translate(158, 78)">
    <!-- front face -->
    <polygon points="0,20 140,20 140,155 0,155" fill="url(#s1front)" opacity="0.9"/>
    <!-- top face -->
    <polygon points="0,20 140,20 162,4 22,4" fill="url(#s1top)" opacity="0.95"/>
    <!-- right side -->
    <polygon points="140,20 162,4 162,139 140,155" fill="url(#s1side)" opacity="0.9"/>
    <!-- top edge glow -->
    <line x1="0" y1="20" x2="140" y2="20" stroke="#22d3ee" stroke-width="2" opacity="0.9"/>
    <!-- Content -->
    <text x="70" y="55" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="white">❄️  STAGE 1</text>
    <text x="70" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.9)">Backbone: FROZEN</text>
    <line x1="15" y1="82" x2="125" y2="82" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    <text x="70" y="96" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">Epochs: 15</text>
    <text x="70" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">LR: 1e-3</text>
    <text x="70" y="124" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">Train Head Only</text>
    <text x="70" y="142" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#67e8f9">Adam Optimizer</text>
  </g>

  <!-- Arrow 1→2 -->
  <g opacity="0.7">
    <line x1="322" y1="155" x2="358" y2="155" stroke="#a78bfa" stroke-width="2.5"/>
    <polygon points="358,150 366,155 358,160" fill="#a78bfa"/>
    <!-- Label above arrow -->
    <text x="340" y="145" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#fbbf24">unfreeze</text>
    <text x="340" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#fbbf24">top layers</text>
  </g>

  <!-- ══ BLOCK 2: Stage 2 — Fine-tune (Purple, tallest) ══ -->
  <g filter="url(#pipeShadow)" transform="translate(360, 58)">
    <polygon points="0,20 140,20 140,175 0,175" fill="url(#s2front)" opacity="0.9"/>
    <polygon points="0,20 140,20 162,4 22,4" fill="url(#s2top)" opacity="0.95"/>
    <polygon points="140,20 162,4 162,159 140,175" fill="url(#s2side)" opacity="0.9"/>
    <line x1="0" y1="20" x2="140" y2="20" stroke="#a78bfa" stroke-width="2" opacity="0.9"/>
    <!-- glow halo -->
    <ellipse cx="70" cy="100" rx="55" ry="30" fill="#7c6af7" opacity="0.08"/>
    <text x="70" y="55" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="white">🔥  STAGE 2</text>
    <text x="70" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.9)">Fine-Tuning</text>
    <line x1="15" y1="82" x2="125" y2="82" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    <text x="70" y="96" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">Epochs: 25</text>
    <text x="70" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">LR: 1e-4</text>
    <text x="70" y="124" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">Top 30 layers unfrozen</text>
    <text x="70" y="138" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.7)">End-to-end training</text>
    <text x="70" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#a78bfa">Adam + ReduceLR</text>
  </g>

  <!-- Arrow 2→Callbacks -->
  <g opacity="0.7">
    <line x1="524" y1="155" x2="558" y2="155" stroke="#fbbf24" stroke-width="2.5"/>
    <polygon points="558,150 566,155 558,160" fill="#fbbf24"/>
  </g>

  <!-- ══ BLOCK 3: Callbacks (Amber) ══ -->
  <g filter="url(#pipeShadow)" transform="translate(560, 90)">
    <polygon points="0,20 120,20 120,130 0,130" fill="url(#cbFront)" opacity="0.9"/>
    <polygon points="0,20 120,20 138,6 18,6" fill="url(#cbTop)" opacity="0.95"/>
    <polygon points="120,20 138,6 138,116 120,130" fill="url(#cbSide)" opacity="0.9"/>
    <line x1="0" y1="20" x2="120" y2="20" stroke="#fbbf24" stroke-width="2" opacity="0.9"/>
    <text x="60" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="white">CALLBACKS</text>
    <line x1="10" y1="58" x2="110" y2="58" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    <text x="60" y="73" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.8)">EarlyStopping</text>
    <text x="60" y="86" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.8)">patience=5</text>
    <text x="60" y="99" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.8)">ReduceLROnPlateau</text>
    <text x="60" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.8)">ModelCheckpoint</text>
  </g>

  <!-- Arrow Callbacks→Output -->
  <g opacity="0.7">
    <line x1="702" y1="155" x2="736" y2="155" stroke="#6ee7b7" stroke-width="2.5"/>
    <polygon points="736,150 744,155 736,160" fill="#6ee7b7"/>
  </g>

  <!-- ══ BLOCK 4: Saved Model (Green) ══ -->
  <g filter="url(#pipeShadow)" transform="translate(738, 100)">
    <polygon points="0,20 120,20 120,118 0,118" fill="url(#outFront)" opacity="0.9"/>
    <polygon points="0,20 120,20 138,6 18,6" fill="url(#outTop)" opacity="0.95"/>
    <polygon points="120,20 138,6 138,104 120,118" fill="url(#outSide)" opacity="0.9"/>
    <line x1="0" y1="20" x2="120" y2="20" stroke="#34d399" stroke-width="2" opacity="0.9"/>
    <!-- star glow -->
    <ellipse cx="60" cy="70" rx="40" ry="20" fill="#34d399" opacity="0.1"/>
    <text x="60" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="white">💾 SAVED</text>
    <text x="60" y="64" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.8)">.keras model</text>
    <line x1="10" y1="72" x2="110" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
    <text x="60" y="86" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.7)">gender_classes.pkl</text>
    <text x="60" y="98" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.7)">img_size.pkl</text>
    <text x="60" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-size="7.5" fill="rgba(255,255,255,0.7)">max_age.pkl</text>
  </g>

  <!-- Floating dots decoration -->
  <circle cx="140" cy="80" r="2.5" fill="#67e8f9" opacity="0.35"/>
  <circle cx="340" cy="250" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="530" cy="65" r="2" fill="#fbbf24" opacity="0.3"/>
  <circle cx="740" cy="260" r="2.5" fill="#6ee7b7" opacity="0.35"/>
  <circle cx="60" cy="250" r="1.5" fill="#f472b6" opacity="0.25"/>
  <circle cx="880" cy="90" r="2" fill="#a78bfa" opacity="0.25"/>

  <!-- Ground glow shadows -->
  <ellipse cx="228" cy="235" rx="75" ry="12" fill="#0891b2" opacity="0.12"/>
  <ellipse cx="430" cy="235" rx="75" ry="12" fill="#7c6af7" opacity="0.12"/>
  <ellipse cx="620" cy="220" rx="65" ry="10" fill="#b45309" opacity="0.10"/>
  <ellipse cx="798" cy="220" rx="65" ry="10" fill="#059669" opacity="0.10"/>
</svg>
